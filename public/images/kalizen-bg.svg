<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <!-- Background gradient for sky -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cfd9df" />
      <stop offset="100%" stop-color="#e2ebf0" />
    </linearGradient>
    <linearGradient id="mountainsBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a1b5c1" />
      <stop offset="100%" stop-color="#738996" />
    </linearGradient>
    <linearGradient id="mountainsFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#808f9b" />
      <stop offset="100%" stop-color="#4d5c66" />
    </linearGradient>
    <linearGradient id="fieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#697a6f" />
      <stop offset="100%" stop-color="#3b4841" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="800" fill="url(#skyGrad)" />
  
  <!-- Sun/Moon -->
  <circle cx="800" cy="300" r="100" fill="#fdfbf7" opacity="0.6" />
  
  <!-- Back Mountains -->
  <path d="M0,600 L150,350 L350,500 L600,200 L900,550 L1200,300 L1200,800 L0,800 Z" fill="url(#mountainsBack)" />
  
  <!-- Front Mountains -->
  <path d="M-100,800 L200,450 L450,600 L750,300 L1050,550 L1300,400 L1300,800 L-100,800 Z" fill="url(#mountainsFront)" opacity="0.8" />
  
  <!-- Foreground Field -->
  <path d="M0,650 Q300,580 600,650 T1200,600 L1200,800 L0,800 Z" fill="url(#fieldGrad)" />
  <path d="M0,720 Q400,680 800,750 T1200,700 L1200,800 L0,800 Z" fill="#313d36" />
</svg>
